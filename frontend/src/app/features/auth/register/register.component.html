<div class="auth-container d-flex align-items-center justify-content-center">
  <div class="glow-bg"></div>
  <mat-card class="auth-card glass-card p-4">
    <div class="text-center mb-4">
      <h1 class="brand-title">Brieflyy</h1>
      <p class="brand-subtitle text-muted">Create your early-career account</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Full Name</mat-label>
        <input matInput type="text" formControlName="name" placeholder="John Doe" />
        <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Email Address</mat-label>
        <input matInput type="email" formControlName="email" placeholder="you@domain.com" />
        <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Please enter a valid email address</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" placeholder="••••••••" />
        <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Password must be at least 6 characters</mat-error>
      </mat-form-field>

      <div *ngIf="errorMessage" class="error-banner p-3 rounded mb-2">
        <span class="error-text"><i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}</span>
      </div>

      <button mat-flat-button color="primary" type="submit" class="submit-btn py-3 mt-2" [disabled]="registerForm.invalid || loading">
        <span *ngIf="!loading">Create Account</span>
        <mat-spinner diameter="24" *ngIf="loading" class="spinner-center"></mat-spinner>
      </button>
    </form>

    <div class="text-center mt-4">
      <span class="text-muted">Already have an account? </span>
      <a routerLink="/auth/login" class="auth-link">Sign In</a>
    </div>
  </mat-card>
</div>

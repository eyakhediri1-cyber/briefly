# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, prefixed by ',' for multiple paths.
# prepend_sys_path = .

# timezone to use when rendering dates and times in generated migrations
# timezone =

# max length of characters to copy to slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty/non-functioning migrations
# to be created by the 'revision' command
# allow_empty_history = false

# version location specification; this defaults
# to alembic/versions.  when using multiple version
# directories, initial revisions must be specified with --version-path
# version_locations = %(here)s/alembic/versions

# version_path_separator = :

# set to 'true' to search for newer versions in
# version_locations when running 'alembic history'
# history_revisions_only = false


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
